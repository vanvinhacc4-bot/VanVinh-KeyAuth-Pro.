name: VanVinh-Build-Pro
on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Theos (Tốc độ cao)
        run: |
          git clone https://github.com/theos/theos.git /Users/runner/theos
          echo "THEOS=/Users/runner/theos" >> $GITHUB_ENV
          
      - name: Setup SDK (Link dự phòng)
        run: |
          mkdir -p /Users/runner/theos/sdks
          # Tải SDK 14.5 từ nguồn khác, định dạng zip cho an toàn
          curl -L https://github.com/theos/sdks/archive/master.zip --output sdks.zip
          unzip -q sdks.zip -d /Users/runner/theos/sdks
          # Di chuyển các file vào đúng vị trí
          mv /Users/runner/theos/sdks/sdks-master/* /Users/runner/theos/sdks/
          rm -rf sdks.zip /Users/runner/theos/sdks/sdks-master

      - name: Build Dylib
        run: |
          export THEOS=/Users/runner/theos
          # Lệnh build bỏ qua mọi cảnh báo để ra file
          make FINALPACKAGE=1

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VanVinh-KeyAuth-Dylib
          path: .theos/obj/*.dylib
