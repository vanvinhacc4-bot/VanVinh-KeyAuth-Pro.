name: VanVinh-Build-Pro
on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Theos (Rút gọn)
        run: |
          # Chỉ tải bộ lõi Theos, không tải submodule nặng
          git clone https://github.com/theos/theos.git /Users/runner/theos
          echo "THEOS=/Users/runner/theos" >> $GITHUB_ENV
          
      - name: Setup SDK (Trực tiếp)
        run: |
          mkdir -p /Users/runner/theos/sdks
          # Dùng link này tải cực nhanh
          curl -L https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz --output SDK.tar.xz
          tar -xf SDK.tar.xz -C /Users/runner/theos/sdks
          rm SDK.tar.xz

      - name: Build Dylib
        run: |
          export THEOS=/Users/runner/theos
          # Lệnh build bỏ qua kiểm tra package để tránh lỗi
          make FINALPACKAGE=1

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VanVinh-KeyAuth-Dylib
          path: .theos/obj/*.dylib
