name: VanVinh-Build-Pro
on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Theos & SDK
        run: |
          # Tải Theos rút gọn
          git clone --recursive https://github.com/theos/theos.git /Users/runner/theos
          echo "THEOS=/Users/runner/theos" >> $GITHUB_ENV
          
          # Tải SDK trực tiếp vào thư mục
          mkdir -p /Users/runner/theos/sdks
          curl -L https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz --output SDK.tar.xz
          tar -xf SDK.tar.xz -C /Users/runner/theos/sdks
          rm SDK.tar.xz

      - name: Build Dylib
        run: |
          export THEOS=/Users/runner/theos
          # Sử dụng lệnh build trực tiếp, bỏ qua tạo package deb
          make FINALPACKAGE=1

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VanVinh-KeyAuth-Dylib
          path: .theos/obj/*.dylib
